# /etc/nginx/sites-available/algopro.conf
#
# Reverse proxy + TLS for AlgoPro Engine.
#
# Replace algopro.example.com with your real domain BEFORE running certbot.
# Install:
#   sudo cp deploy/nginx-algopro.conf /etc/nginx/sites-available/algopro.conf
#   sudo ln -s /etc/nginx/sites-available/algopro.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d algopro.example.com   # provisions the cert + 443 block
#
# certbot will rewrite parts of this file to add the certificate lines and the
# HTTP->HTTPS redirect. The map + upstream below are safe to keep as-is.

# WebSocket upgrade handling for /ws (dashboard live stream).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream algopro_backend {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name algopro.example.com;

    # certbot inserts the ACME challenge + redirect here on first run.

    # Don't let random scanners pull big bodies; TradingView payloads are tiny.
    client_max_body_size 256k;

    # ── Dashboard + API ──────────────────────────────────────────────────
    location / {
        proxy_pass http://algopro_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 75s;
    }

    # ── WebSocket live stream ────────────────────────────────────────────
    location /ws {
        proxy_pass http://algopro_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep idle dashboard sockets alive.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── TradingView webhook ──────────────────────────────────────────────
    # X-Webhook-Secret is a standard header and is forwarded by the proxy_pass
    # above automatically; this block just lets you rate-limit it separately.
    location = /api/webhook {
        proxy_pass http://algopro_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Webhook-Secret  $http_x_webhook_secret;
    }
}
